<!DOCTYPE html>
<html lang="th">

<head>

    <meta charset="UTF-8">

    <title>ลืมรหัสผ่าน - MPM SHOP</title>

    <link rel="stylesheet" href="../css/style.css">

    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600;700&display=swap" rel="stylesheet">

</head>

<body>

    <div class="theme-transition"></div>

    <button id="globalThemeToggle" class="theme-toggle floating-toggle" type="button">☀️</button>

    <div class="container">

        <!-- LEFT -->

        <div class="left">

            <img src="../images/shop.png" class="shop-image">

            <h2>
                รีเซ็ตรหัสผ่านของคุณ
            </h2>

            <p>
                กรอกอีเมลที่ใช้สมัครสมาชิก
                เพื่อรับรหัส OTP สำหรับตั้งรหัสผ่านใหม่
            </p>

        </div>

        <!-- RIGHT -->

        <div class="right">

            <div class="login-box">

                <h1>
                    ลืมรหัสผ่าน
                </h1>

                <div class="subtitle-row">

                    <p class="subtitle">
                        รีเซ็ตรหัสผ่านบัญชีของคุณ
                    </p>

                    <img src="../images/logo.gif" class="mini-logo">

                </div>

                <!-- FORM -->

                <form id="forgotForm">

                    <div class="input-group">

                        <input type="email" id="email" placeholder="กรอกอีเมล" required>

                    </div>

                    <button type="submit" class="login-btn">

                        ส่งรหัส OTP

                    </button>

                </form>

                <div class="login-footer">

                    <div class="footer-row">

                        <div class="footer-text">

                            <p>

                                จำรหัสผ่านได้แล้ว ?

                                <a href="login.html">
                                    เข้าสู่ระบบ
                                </a>

                            </p>

                            <small>
                                ระบบรีเซ็ตรหัสผ่านปลอดภัย
                                ด้วย Email OTP
                            </small>

                        </div>

                        <img src="../images/logo.gif" class="footer-logo">

                    </div>

                </div>

            </div>

        </div>

    </div>

    <script>

        const form =
            document.getElementById('forgotForm')

        form.addEventListener('submit', (e) => {

            e.preventDefault()

            const email =
                document.getElementById('email').value

            alert(
                'ส่ง OTP ไปที่ ' + email + ' แล้ว'
            )

        })

    </script>

    <script src="../js/theme.js"></script>

</body>

</html>
