<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>สร้างเว็บไซต์ - MPM SHOP</title>
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <link rel="stylesheet" href="../css/shop.css">
    <style>
        body { min-height: 100vh; background: radial-gradient(circle at top left, rgba(255,79,160,.16), transparent 28%), #fff8fd; font-family: 'Prompt', sans-serif; }
        .site-builder { min-height: 100vh; display: grid; place-items: center; padding: 34px 18px; }
        .builder-card { width: min(760px, 100%); background: #fff; border: 1px solid #ffd8ec; border-radius: 28px; padding: 28px; box-shadow: 0 30px 80px rgba(255,79,160,.16); }
        .builder-head { display: flex; align-items: center; gap: 16px; margin-bottom: 24px; }
        .builder-icon { width: 64px; height: 64px; border-radius: 20px; display: grid; place-items: center; color: #fff; font-size: 26px; background: linear-gradient(135deg, #ff4fa0, #b65cff); }
        .builder-head h1 { font-size: 32px; margin-bottom: 4px; }
        .builder-head p { color: #777; }
        .builder-form { display: grid; gap: 16px; }
        .builder-field label { display: block; font-weight: 800; margin-bottom: 8px; }
        .builder-input { height: 58px; display: flex; align-items: center; gap: 12px; padding: 0 16px; border-radius: 16px; border: 1px solid #ffc8e4; background: #fff9fd; }
        .builder-input input { flex: 1; border: 0; outline: 0; background: transparent; font: inherit; min-width: 0; }
        .builder-input span { color: #ff4fa0; font-weight: 800; white-space: nowrap; }
        .builder-btn { height: 60px; border: 0; border-radius: 18px; color: #fff; background: linear-gradient(135deg, #ff4fa0, #ff72bb); font: inherit; font-weight: 800; cursor: pointer; box-shadow: 0 18px 36px rgba(255,79,160,.25); }
        .builder-result { margin-top: 18px; padding: 16px; border-radius: 18px; display: none; line-height: 1.7; }
        .builder-result.success { display: block; background: #eafff4; color: #009c63; border: 1px solid #bdf5dc; }
        .builder-result.error { display: block; background: #fff0f5; color: #d92668; border: 1px solid #ffd0e2; }
        .builder-links { display: flex; gap: 10px; margin-top: 18px; flex-wrap: wrap; }
        .builder-links a { color: #333; text-decoration: none; font-weight: 800; padding: 10px 14px; border-radius: 14px; background: #fff3fa; border: 1px solid #ffd8ec; }
        @media (max-width: 620px) { .builder-head { align-items: flex-start; } .builder-head h1 { font-size: 26px; } .builder-input { height: auto; min-height: 58px; align-items: flex-start; flex-direction: column; padding: 14px 16px; } }
    </style>
</head>
<body>
    <main class="site-builder">
        <section class="builder-card">
            <div class="builder-head">
                <div class="builder-icon"><i class="fa-solid fa-wand-magic-sparkles"></i></div>
                <div>
                    <h1>สร้างเว็บไซต์ของคุณ</h1>
                    <p>กรอกชื่อร้านที่ต้องการและ Key ที่ซื้อจาก MPM SHOP</p>
                </div>
            </div>

            <form class="builder-form" id="siteBuilderForm">
                <div class="builder-field">
                    <label>ชื่อเว็บไซต์</label>
                    <div class="builder-input">
                        <input id="siteName" type="text" placeholder="เช่น Hunter Shop" required>
                    </div>
                </div>

                <div class="builder-field">
                    <label>Subdomain</label>
                    <div class="builder-input">
                        <input id="subdomain" type="text" placeholder="huntershop" required>
                        <span>.mpmshop.xyz</span>
                    </div>
                </div>

                <div class="builder-field">
                    <label>Key ที่ซื้อมา</label>
                    <div class="builder-input">
                        <input id="rentalKey" type="text" placeholder="MPMSHOP-XXXX-XXXXXX" required>
                    </div>
                </div>

                <button class="builder-btn" type="submit">
                    <i class="fa-solid fa-sparkles"></i>
                    เปิดเว็บไซต์
                </button>
            </form>

            <div class="builder-result" id="builderResult"></div>

            <div class="builder-links">
                <a href="shop.html"><i class="fa-solid fa-store"></i> กลับหน้าร้านค้า</a>
                <a href="home.html"><i class="fa-solid fa-house"></i> กลับหน้าแรก</a>
            </div>
        </section>
    </main>

    <script>
        const params = new URLSearchParams(location.search)
        const keyFromUrl = params.get('key')
        if (keyFromUrl) document.getElementById('rentalKey').value = keyFromUrl

        document.getElementById('siteBuilderForm').addEventListener('submit', async (e) => {
            e.preventDefault()
            const result = document.getElementById('builderResult')
            const token = localStorage.getItem('token')

            if (!token) {
                result.className = 'builder-result error'
                result.textContent = 'กรุณาเข้าสู่ระบบก่อนสร้างเว็บไซต์'
                return
            }

            const body = {
                name: document.getElementById('siteName').value.trim(),
                subdomain: document.getElementById('subdomain').value.trim(),
                code: document.getElementById('rentalKey').value.trim()
            }

            result.className = 'builder-result'
            result.textContent = ''

            try {
                const res = await fetch('http://localhost:5000/api/tenants/activate', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        Authorization: `Bearer ${token}`
                    },
                    body: JSON.stringify(body)
                })
                const data = await res.json()
                result.className = res.ok ? 'builder-result success' : 'builder-result error'
                result.innerHTML = res.ok
                    ? `เปิดเว็บไซต์สำเร็จ<br><b>${data.url}</b><br>วันหมดอายุ: ${new Date(data.tenant.expiresAt).toLocaleDateString('th-TH')}`
                    : data.message || 'เปิดเว็บไซต์ไม่สำเร็จ'
            } catch (err) {
                result.className = 'builder-result error'
                result.textContent = 'เชื่อมต่อ server ไม่ได้'
            }
        })
    </script>
</body>
</html>
