<!DOCTYPE html><html lang="th"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>ข่าวสาร - MPM SHOP</title><link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600;700&display=swap" rel="stylesheet"><link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"><link rel="stylesheet" href="../../css/dashboard.css"></head><body><div class="theme-transition"></div><div class="dashboard"><div id="dashboardSidebar" data-active="news"></div><main class="main-content"><div class="topbar"><div><h1>ข่าวสาร</h1><p>จัดการประกาศ ข่าวอัปเดต และข้อความโปรโมชันของร้าน</p></div><div class="topbar-right"><button id="themeToggle" class="theme-toggle">☀️</button><div class="profile"><img src="../../images/logo.gif" alt="profile"></div></div></div>
<div class="cute-hero-panel"><div class="cute-hero-icon orange"><i class="fa-solid fa-newspaper"></i></div><div><h2>ข่าวสารและประกาศ</h2><p>เพิ่มประกาศให้แสดงบนหน้าร้าน และเก็บข่าวโปรโมชันไว้ในหลังบ้าน</p></div></div><div class="page-header"><div><h2>รายการข่าวสาร</h2><p>สร้างประกาศใหม่หรือเปิดปิดข้อความที่แสดงบนหน้าร้าน</p></div><button class="add-btn" id="openNews"><i class="fa-solid fa-plus"></i> เพิ่มประกาศ</button></div><div class="cute-admin-card"><div class="cute-list" id="newsList"></div></div>
<div class="modal-overlay" id="newsModal"><div class="modal-box"><div class="modal-header"><h2>เพิ่มประกาศ</h2><button class="modal-close" id="closeNews"><i class="fa-solid fa-xmark"></i></button></div><div class="input-group"><label>หัวข้อ</label><input id="newsTitle" type="text" placeholder="เช่น โปรโมชันประจำเดือน"></div><div class="input-group"><label>ข้อความประกาศ</label><textarea id="newsText" rows="5" placeholder="ข้อความที่ต้องการประกาศบนหน้าร้าน"></textarea></div><button class="add-btn modal-save" id="saveNews"><i class="fa-solid fa-bullhorn"></i> บันทึกประกาศ</button></div></div>
</main></div><script src="../../js/dashboard-nav.js"></script><script src="../../js/theme.js"></script><script src="../../js/site-config.js"></script><script src="../../js/dashboard.js"></script><script>
const modal=document.getElementById('newsModal'),listEl=document.getElementById('newsList'),titleIn=document.getElementById('newsTitle'),textIn=document.getElementById('newsText');function readNews(){return JSON.parse(localStorage.getItem('mpm_news')||'[]')}function writeNews(list){localStorage.setItem('mpm_news',JSON.stringify(list));const cfg=MPMSite.read();cfg.announcements=list.filter(x=>x.enabled).map(x=>x.text);MPMSite.write(cfg)}function render(){const list=readNews();listEl.innerHTML=list.length?list.map((n,i)=>'<div class="cute-row news-row"><div class="cute-row-icon"><i class="fa-solid fa-bullhorn"></i></div><div><b>'+n.title+'</b><span>'+n.text+'</span></div><button class="soft-btn" data-toggle="'+i+'">'+(n.enabled?'เผยแพร่อยู่':'ปิดอยู่')+'</button><button class="action-btn delete" data-del="'+i+'"><i class="fa-solid fa-trash"></i></button></div>').join(''):'<div class="cute-empty"><i class="fa-solid fa-newspaper"></i><b>ยังไม่มีประกาศ</b><span>กดเพิ่มประกาศเพื่อเริ่มใช้งาน</span></div>'}document.getElementById('openNews').onclick=()=>modal.classList.add('active');document.getElementById('closeNews').onclick=()=>modal.classList.remove('active');modal.onclick=e=>{if(e.target===modal)modal.classList.remove('active')};document.getElementById('saveNews').onclick=()=>{const title=titleIn.value.trim(),text=textIn.value.trim();if(!title||!text)return;const list=readNews();list.unshift({title,text,enabled:true,time:new Date().toISOString()});writeNews(list);titleIn.value='';textIn.value='';modal.classList.remove('active');render()};listEl.onclick=e=>{const list=readNews(),del=e.target.closest('[data-del]'),tog=e.target.closest('[data-toggle]');if(del)list.splice(Number(del.dataset.del),1);if(tog)list[Number(tog.dataset.toggle)].enabled=!list[Number(tog.dataset.toggle)].enabled;writeNews(list);render()};render();
</script></body></html>
