<!DOCTYPE html><html lang="th"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>เติมเครดิต - MPM SHOP</title><link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600;700&display=swap" rel="stylesheet"><link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"><link rel="stylesheet" href="../../css/dashboard.css"></head><body><div class="theme-transition"></div><div class="dashboard"><div id="dashboardSidebar" data-active="credit"></div><main class="main-content"><div class="topbar"><div><h1>เติมเครดิต</h1><p>เติมเครดิตให้ลูกค้าด้วยอีเมลที่สมัครไว้</p></div><div class="topbar-right"><button id="themeToggle" class="theme-toggle">☀️</button><div class="profile"><img src="../../images/logo.gif" alt="profile"></div></div></div>
<div class="cute-hero-panel"><div class="cute-hero-icon pink"><i class="fa-solid fa-coins"></i></div><div><h2>เติมเครดิตให้ลูกค้า</h2><p>กรอกอีเมลที่ลูกค้าใช้สมัคร แล้วเพิ่มยอดเครดิตให้ถูกบัญชี</p></div></div><div class="cute-admin-grid two"><section class="cute-admin-card"><div class="cute-card-head"><div><h2>เพิ่มเครดิต</h2><p>ระบบจะค้นหาจากอีเมลในข้อมูลสมาชิก</p></div></div><div class="cute-field-row"><label>อีเมลลูกค้า</label><div class="cute-input"><i class="fa-solid fa-envelope"></i><input id="creditEmail" type="email" placeholder="customer@email.com"></div></div><div class="cute-field-row"><label>จำนวนเครดิต (บาท)</label><div class="cute-input"><i class="fa-solid fa-baht-sign"></i><input id="creditAmount" type="number" min="1" step="0.01" placeholder="100"></div></div><div class="cute-field-row"><label>หมายเหตุ</label><textarea id="creditNote" rows="4" placeholder="เช่น เติมจากสลิป / โบนัส / ชดเชย"></textarea></div><button class="add-btn full" id="addCredit"><i class="fa-solid fa-plus"></i> เติมเครดิตให้ลูกค้า</button></section><section class="cute-admin-card"><div class="cute-card-head"><div><h2>ประวัติเติมเครดิต</h2><p>รายการล่าสุดที่เพิ่มเครดิตจากหลังบ้าน</p></div><div style="display:flex;gap:10px;align-items:center"><span class="cute-pill" id="creditTotal">0 รายการ</span><button class="soft-btn" id="resetCreditDemo"><i class="fa-solid fa-rotate"></i> รีเซ็ตข้อมูลทดสอบ</button></div></div><div class="cute-list" id="creditLog"></div></section></div>
</main></div><div class="toast-container" id="toastContainer"></div><script src="../../js/dashboard-nav.js"></script><script src="../../js/theme.js"></script><script src="../../js/site-config.js"></script><script src="../../js/dashboard.js"></script><script>
function toast(type,title,msg){const box=document.getElementById('toastContainer');const t=document.createElement('div');t.className='toast '+type;t.innerHTML='<div class="toast-icon"><i class="fa-solid '+(type==='error'?'fa-xmark':'fa-check')+'"></i></div><div class="toast-content"><h4>'+title+'</h4><p>'+msg+'</p></div>';box.appendChild(t);setTimeout(()=>t.remove(),2600)}
const emailIn=document.getElementById('creditEmail'),amountIn=document.getElementById('creditAmount'),noteIn=document.getElementById('creditNote'),logBox=document.getElementById('creditLog'),totalEl=document.getElementById('creditTotal');function logs(){return JSON.parse(localStorage.getItem('mpm_credit_logs')||'[]')}function users(){return JSON.parse(localStorage.getItem('mpm_mock_users')||'[]')}function render(){const l=logs();totalEl.textContent=l.length+' รายการ';logBox.innerHTML=l.length?l.map(x=>'<div class="cute-row"><div class="cute-row-icon"><i class="fa-solid fa-coins"></i></div><div><b>'+x.email+'</b><span>'+(x.note||'เติมเครดิตจากหลังบ้าน')+'</span></div><strong>+฿'+Number(x.amount).toLocaleString('en-US',{minimumFractionDigits:2})+'</strong></div>').join(''):'<div class="cute-empty"><i class="fa-solid fa-receipt"></i><b>ยังไม่มีประวัติ</b><span>เมื่อเติมเครดิต รายการจะแสดงตรงนี้</span></div>'}document.getElementById('addCredit').onclick=async()=>{const email=emailIn.value.trim().toLowerCase(),amount=Number(amountIn.value);if(!email||!email.includes('@'))return toast('error','อีเมลไม่ถูกต้อง','กรุณาใส่อีเมลที่ลูกค้าใช้สมัคร');if(!amount||amount<=0)return toast('error','จำนวนเครดิตไม่ถูกต้อง','กรุณาใส่ยอดมากกว่า 0');let apiUser=null;let apiError='';try{const res=await fetch('http://localhost:5000/api/users/credit',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({email,amount})});const data=await res.json();if(res.ok){apiUser=data.user}else{apiError=data.message||'เติมเครดิตไม่สำเร็จ'}}catch(e){apiError='เชื่อมต่อ backend ไม่ได้'}const us=users();const idx=us.findIndex(u=>String(u.email||'').toLowerCase()===email);if(idx>=0){us[idx].balance=Number(us[idx].balance||0)+amount;localStorage.setItem('mpm_mock_users',JSON.stringify(us))}const cur=JSON.parse(localStorage.getItem('user')||'null');if(cur&&String(cur.email||'').toLowerCase()===email){cur.balance=Number(cur.balance||0)+amount;localStorage.setItem('user',JSON.stringify(cur))}const note=noteIn.value.trim();const h=logs();const tx={id:'CR'+Date.now(),type:'credit',method:'admin-credit',user:email.split('@')[0]||email,userEmail:email,userId:apiUser?._id||apiUser?.id||(idx>=0?(us[idx]._id||us[idx].id||'-'):'-'),amount,status:'approved',time:new Date().toISOString(),note:note||'เพิ่มเครดิตโดยแอดมิน'};h.unshift({email,amount,note,found:!!apiUser||idx>=0,time:tx.time});localStorage.setItem('mpm_credit_logs',JSON.stringify(h.slice(0,100)));const txs=JSON.parse(localStorage.getItem('mpm_transactions')||'[]');txs.unshift(tx);localStorage.setItem('mpm_transactions',JSON.stringify(txs.slice(0,250)));emailIn.value='';amountIn.value='';noteIn.value='';render();toast(apiUser?'success':'error',apiUser?'เติมเครดิตสำเร็จ':'เติมเครดิตไม่สำเร็จ',apiUser?'เพิ่มยอดใน MongoDB แล้ว และสร้างรายการธุรกรรมแล้ว':apiError)};render();document.getElementById('resetCreditDemo')?.addEventListener('click',()=>{const time=new Date().toISOString();const demo={username:'NOT',email:'not@test.com',role:'user',balance:500,_id:'U-DEMO',createdAt:time};const demoNote='Reset demo: add credit to NOT';const demoTx={id:'CR'+Date.now(),type:'credit',method:'admin-credit',user:'NOT',userEmail:'not@test.com',userId:'U-DEMO',amount:500,status:'approved',time,note:demoNote};localStorage.setItem('mpm_mock_users',JSON.stringify([demo]));localStorage.setItem('mpm_credit_logs',JSON.stringify([{email:'not@test.com',amount:500,note:demoNote,found:true,time}]));localStorage.setItem('mpm_transactions',JSON.stringify([demoTx]));emailIn.value='not@test.com';amountIn.value='500';noteIn.value='รีเซ็ตทดสอบ: เพิ่มเครดิตให้ลูกค้า NOT';render();toast('success','รีเซ็ตข้อมูลทดสอบแล้ว','กดเติมเครดิตเพื่อสร้างรายการจริงและดูยอดเข้าในธุรกรรม')});
</script></body></html>
