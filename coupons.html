<!DOCTYPE html><html lang="th"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>คูปองส่วนลด - MPM SHOP</title><link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600;700&display=swap" rel="stylesheet"><link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"><link rel="stylesheet" href="../../css/dashboard.css"></head><body><div class="theme-transition"></div><div class="dashboard"><div id="dashboardSidebar" data-active="coupons"></div><main class="main-content"><div class="topbar"><div><h1>คูปองส่วนลด</h1><p>สร้างและจัดการโค้ดส่วนลดสำหรับลูกค้า</p></div><div class="topbar-right"><button id="themeToggle" class="theme-toggle">☀️</button><div class="profile"><img src="../../images/logo.gif" alt="profile"></div></div></div>
<div class="cute-hero-panel"><div class="cute-hero-icon purple"><i class="fa-solid fa-percent"></i></div><div><h2>คูปองส่วนลด</h2><p>สร้างโค้ดส่วนลด เช่น MPMSHOP, ILOVEMPM, MPMSHOP100C ให้ลูกค้านำไปกรอกในหน้าร้าน</p></div></div><div class="page-header"><div><h2>รายการคูปอง</h2><p>กำหนดโค้ด รูปแบบส่วนลด และจำนวนครั้งที่ใช้ได้</p></div><button class="add-btn" id="openCoupon"><i class="fa-solid fa-plus"></i> เพิ่มคูปอง</button></div><div class="cute-admin-card"><div class="cute-list" id="couponList"></div></div>
<div class="modal-overlay" id="couponModal"><div class="modal-box"><div class="modal-header"><h2>สร้างคูปอง</h2><button class="modal-close" id="closeCoupon"><i class="fa-solid fa-xmark"></i></button></div><div class="input-group"><label>รูปแบบโค้ด</label><input id="couponCode" type="text" placeholder="MPMSHOP / ILOVEMPM / MPMSHOP100C"></div><div class="input-group"><label>ประเภทส่วนลด</label><select id="couponType"><option value="fixed">ลดเป็นจำนวนเงิน</option><option value="percent">ลดเป็นเปอร์เซ็นต์</option></select></div><div class="input-group"><label>มูลค่าส่วนลด</label><input id="couponValue" type="number" min="1" placeholder="100"></div><div class="input-group"><label>จำนวนครั้งที่ใช้ได้</label><input id="couponLimit" type="number" min="1" placeholder="50"></div><button class="add-btn modal-save" id="saveCoupon"><i class="fa-solid fa-ticket"></i> บันทึกคูปอง</button></div></div>
</main></div><script src="../../js/dashboard-nav.js"></script><script src="../../js/theme.js"></script><script src="../../js/site-config.js"></script><script src="../../js/dashboard.js"></script><script>
const modal=document.getElementById('couponModal'),listEl=document.getElementById('couponList');function readCoupons(){return JSON.parse(localStorage.getItem('mpm_coupons')||'[]')}function writeCoupons(list){localStorage.setItem('mpm_coupons',JSON.stringify(list))}function render(){const list=readCoupons();listEl.innerHTML=list.length?list.map((c,i)=>'<div class="cute-row coupon-row"><div class="cute-row-icon"><i class="fa-solid fa-ticket"></i></div><div><b>'+c.code+'</b><span>'+(c.type==='percent'?'ลด '+c.value+'%':'ลด ฿'+Number(c.value).toLocaleString())+' · ใช้แล้ว '+(c.used||0)+'/'+c.limit+'</span></div><button class="soft-btn" data-copy="'+c.code+'"><i class="fa-solid fa-copy"></i> คัดลอก</button><button class="action-btn delete" data-del="'+i+'"><i class="fa-solid fa-trash"></i></button></div>').join(''):'<div class="cute-empty"><i class="fa-solid fa-ticket"></i><b>ยังไม่มีคูปอง</b><span>กด + คูปอง เพื่อสร้างโค้ดแรก</span></div>'}document.getElementById('openCoupon').onclick=()=>modal.classList.add('active');document.getElementById('closeCoupon').onclick=()=>modal.classList.remove('active');modal.onclick=e=>{if(e.target===modal)modal.classList.remove('active')};document.getElementById('saveCoupon').onclick=()=>{const code=document.getElementById('couponCode').value.trim().toUpperCase().replace(/\s+/g,''),type=document.getElementById('couponType').value,value=Number(document.getElementById('couponValue').value),limit=Number(document.getElementById('couponLimit').value)||1;if(!code||!value)return;const list=readCoupons().filter(c=>c.code!==code);list.unshift({code,type,value,limit,used:0,enabled:true,time:new Date().toISOString()});writeCoupons(list);modal.classList.remove('active');render()};listEl.onclick=e=>{const del=e.target.closest('[data-del]'),copy=e.target.closest('[data-copy]');if(copy)navigator.clipboard?.writeText(copy.dataset.copy);if(del){const list=readCoupons();list.splice(Number(del.dataset.del),1);writeCoupons(list);render()}};render();
</script></body></html>
