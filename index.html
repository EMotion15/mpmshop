<!DOCTYPE html>
<html lang="th">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>MPM SHOP</title>

    <!-- FONT -->
    <link rel="preconnect" href="https://fonts.googleapis.com">

    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <!-- CSS -->
    <link rel="stylesheet" href="../css/home.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

</head>

<body class="light-mode">

    <div class="theme-transition"></div>

    <!-- NAVBAR -->
    <nav class="navbar">

        <div class="logo">

            <img src="../images/logo.gif" class="mini-logo">

            <span class="site-name">MPMSHOP</span>

        </div>

        <div class="nav-menu">

            <a href="#">หน้าแรก</a>
            <a href="#">เติมเงิน</a>
            <a href="#">สินค้า</a>

        </div>

        <div class="nav-buttons" id="guestActions">

            <button id="themeToggle" class="theme-toggle">
                🌙
            </button>

            <a href="login.html" class="login-btn">
                เข้าสู่ระบบ
            </a>

            <a href="register.html" class="register-btn">
                สมัครสมาชิก
            </a>

        </div>

        <div class="user-menu" id="userMenu" style="display:none;">

            <button id="themeToggleLogin" class="theme-toggle">
                🌙
            </button>

            <div class="user-profile" id="userProfileBtn">
                <img src="../images/logo.gif">
                <span id="profileName">User</span>
                <i class="fa-solid fa-chevron-down"></i>
            </div>

            <div class="profile-dropdown" id="profileDropdown">

                <div class="dropdown-header">
                    <img src="../images/logo.gif">
                    <div>
                        <h4 id="dropdownName">User</h4>
                        <p id="dropdownRole">สมาชิกทั่วไป</p>
                    </div>
                </div>

                <div class="balance-box">
                    <span>ยอดเงินคงเหลือ</span>
                    <b>฿&nbsp;&nbsp;<span id="dropdownBalance">0</span></b>
                </div>

                <a href="shop.html">
                    <i class="fa-solid fa-store"></i>
                    เข้าร้านค้า
                </a>

                <a href="dashboard/index.html" id="adminLink" style="display:none;">
                    <i class="fa-solid fa-shield-halved"></i>
                    จัดการระบบหลังบ้าน
                </a>

                <button id="logoutBtn">
                    <i class="fa-solid fa-right-from-bracket"></i>
                    ออกจากระบบ
                </button>

            </div>

        </div>

    </nav>

    <!-- HERO -->
    <section class="hero">

        <!-- LEFT -->
        <div class="hero-left">

            <span class="hero-badge">
                🚀 ระบบร้านค้าออนไลน์แบบใหม่
            </span>

            <h1>

                ร้าน MPM SHOP
                <span>ง่ายกว่าเดิม</span>

            </h1>

            <p>

                ร้านค้าออนไลน์ของเรา
                พร้อมระบบเติมเงินที่ปลอดภัย
                ภายในไม่กี่นาที

            </p>

            <div class="hero-buttons">

                <a href="register.html" class="start-btn">
                    สมัครสมาชิก
                </a>

                <a href="shop.html" class="demo-btn">
                    เยี่ยมชมร้านค้า
                </a>

            </div>

        </div>

        <!-- RIGHT -->
        <div class="hero-right">

            <img src="../images/shop.png" class="shop-image site-banner">

        </div>

    </section>

    <script src="../js/theme.js"></script>
    <script src="../js/site-config.js"></script>
    <script src="../js/home.js"></script>

</body>

</html>
